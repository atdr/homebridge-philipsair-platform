name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, edited, synchronize, reopened]

#edited events also fire for closed/merged PRs, where the commit range no
#longer resolves after a squash merge - only run PR jobs while the PR is open
jobs:
  build:
    name: Node ${{ matrix.node-version }}
    if: github.event_name == 'push' || github.event.pull_request.state == 'open'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x, 24.x]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm run check
      - run: npm run lint:md
      - run: npm test

  commitlint:
    name: Commit messages
    if: github.event_name == 'pull_request' && github.event.pull_request.state == 'open'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v7
        with:
          node-version: 22.x
          cache: npm
      - run: npm ci
      - run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  pr-title:
    name: PR title
    if: github.event_name == 'pull_request' && github.event.pull_request.state == 'open'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22.x
          cache: npm
      - run: npm ci
      - run: echo "$PR_TITLE" | npx commitlint --verbose
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
